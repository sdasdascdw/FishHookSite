<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  color: #222;
}

.topbar {
  background: white;
  padding: 14px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
}

.wrap {
  max-width: 900px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.hidden { display: none; }

input, button {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

#formArea {
  margin-top: 12px;
}

.questionBox {
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  margin-bottom: 14px;
  background: #fafafa;
}

.questionTitle {
  font-weight: bold;
  margin-bottom: 10px;
}

.toggleGroup {
  display: flex;
  gap: 10px;
}

.toggleBtn {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 18px;
  background: white;
  transition: 0.2s;
}

.toggleBtn:hover {
  transform: scale(1.03);
}

.toggleBtn.activeV {
  background: #d4f7d4;
  border: 2px solid #2e7d32;
}

.toggleBtn.activeX {
  background: #ffd6d6;
  border: 2px solid #b71c1c;
}

.ticket {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  background: #fafafa;
}

.status {
  font-weight: bold;
  margin-bottom: 8px;
}

.status.pending { color: orange; }
.status.resolved { color: green; }
.status.denied { color: red; }

.adminBtns {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.note {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
}

.setupWarning {
  background: #fff3cd;
  border: 1px solid #ffe69c;
  color: #664d03;
  padding: 12px;
  border-radius: 8px;
  margin: 20px auto;
  max-width: 860px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Ticket System</div>
  <div id="topRight"></div>
</div>

<div id="setupWarning" class="setupWarning hidden">
  ⚠️ This app needs a JSONBlob URL to store data. See the comment at the top
  of the &lt;script&gt; tag in this file for a 30-second setup step.
</div>

<div class="wrap">

  <div class="card" id="authBox">
    <h3>Login / Register</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <div class="card hidden" id="ticketBox">
    <h3>Create Ticket</h3>
    <input id="nameInput" placeholder="Your name">
    <div id="formArea"></div>
    <button onclick="submitTicket()">Send Ticket</button>
  </div>

  <div class="card hidden" id="adminBox">
    <h3>FishHook Admin</h3>
    <div id="adminTickets"></div>
  </div>

  <div class="card hidden" id="statusBox">
    <h3>My Tickets</h3>
    <div id="myTickets"></div>
  </div>

</div>

<script>
/* ====================================================================
   SETUP (one-time, ~30 seconds, no signup/account/API key needed):

   1. Open a new browser tab and go to:
      https://jsonblob.com/api/jsonBlob
      Use any tool that lets you send a POST request with this JSON body:
      {"users": {}, "tickets": []}

      Easiest way: open a terminal (or use https://reqbin.com/ in your
      browser) and run:

      curl -X POST -H "Content-Type: application/json" \
        -d '{"users": {}, "tickets": []}' \
        https://jsonblob.com/api/jsonBlob -i

   2. The response headers will include a line like:
      Location: https://jsonblob.com/api/jsonBlob/1234567890123456789

      Copy that full URL.

   3. Paste it below, replacing the empty string in BLOB_URL.

   That URL is now your free shared "database" for this app. Anyone who
   loads this page will read/write tickets to that same URL.

   NOTE: jsonblob.com is a free public service with no auth — anyone who
   has the URL can read/write it. Fine for a demo/small internal tool;
   don't use it for sensitive data.
   ==================================================================== */
const BLOB_URL = ""; // <-- paste your jsonblob URL here, e.g. "https://jsonblob.com/api/jsonBlob/1234567890123456789"

const OWNER = "FishHook";
const POLL_INTERVAL_MS = 3000; // how often clients check for new data

const authBox = document.getElementById("authBox");
const ticketBox = document.getElementById("ticketBox");
const adminBox = document.getElementById("adminBox");
const statusBox = document.getElementById("statusBox");
const topRight = document.getElementById("topRight");
const nameInput = document.getElementById("nameInput");
const user = document.getElementById("user");
const pass = document.getElementById("pass");
const setupWarning = document.getElementById("setupWarning");

let currentUser = localStorage.getItem("currentUser"); // session only, not shared data
let pollHandle = null;

if (!BLOB_URL) {
  setupWarning.classList.remove("hidden");
}

// ---- Shared-storage helpers (read/write the whole JSON blob) ----

async function fetchData() {
  const res = await fetch(BLOB_URL, { cache: "no-store" });
  if (!res.ok) throw new Error("could not reach shared storage (status " + res.status + ")");
  return res.json(); // { users: {...}, tickets: [...] }
}

async function saveData(data) {
  const res = await fetch(BLOB_URL, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error("could not save to shared storage (status " + res.status + ")");
}

// ---- Auth ----

async function register() {
  if (!BLOB_URL) return alert("set up BLOB_URL first - see the comment at the top of the script");

  const u = user.value.trim();
  const p = pass.value.trim();
  if (!u || !p) return alert("fill all");

  try {
    const data = await fetchData();
    if (data.users[u]) return alert("username exists");

    data.users[u] = { pass: p };
    await saveData(data);
    alert("registered");
  } catch (err) {
    alert(err.message);
  }
}

async function login() {
  if (!BLOB_URL) return alert("set up BLOB_URL first - see the comment at the top of the script");

  const u = user.value.trim();
  const p = pass.value.trim();

  try {
    const data = await fetchData();
    if (!data.users[u] || data.users[u].pass !== p) return alert("wrong login");

    currentUser = u;
    localStorage.setItem("currentUser", u);
    loadUI();
  } catch (err) {
    alert(err.message);
  }
}

function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

// ---- Ticket form ----

const questions = [
  { text: "Do you need help?" }
];

function buildForm() {
  const out = document.getElementById("formArea");
  out.innerHTML = "";

  questions.forEach((q) => {
    const box = document.createElement("div");
    box.className = "questionBox";

    const title = document.createElement("div");
    title.className = "questionTitle";
    title.innerText = q.text;

    let state = null;

    const group = document.createElement("div");
    group.className = "toggleGroup";

    const yes = document.createElement("div");
    yes.className = "toggleBtn";
    yes.innerText = "✅";

    const no = document.createElement("div");
    no.className = "toggleBtn";
    no.innerText = "❌";

    yes.onclick = () => {
      state = state === "yes" ? null : "yes";
      yes.classList.toggle("activeV", state === "yes");
      no.classList.remove("activeX");
    };

    no.onclick = () => {
      state = state === "no" ? null : "no";
      no.classList.toggle("activeX", state === "no");
      yes.classList.remove("activeV");
    };

    box._getValue = () => state;

    group.appendChild(yes);
    group.appendChild(no);

    box.appendChild(title);
    box.appendChild(group);
    out.appendChild(box);
  });
}

async function submitTicket() {
  const name = nameInput.value.trim();
  if (!name) return alert("name required");

  const answers = [];
  document.querySelectorAll(".questionBox").forEach((box, i) => {
    answers.push({
      q: questions[i].text,
      a: box._getValue()
    });
  });

  try {
    const data = await fetchData();
    data.tickets.push({
      id: Date.now(),
      user: currentUser,
      name,
      status: "pending",
      answers
    });
    await saveData(data);

    nameInput.value = "";
    buildForm();
    refreshAndRender();
  } catch (err) {
    alert(err.message);
  }
}

async function setStatus(id, status) {
  try {
    const data = await fetchData();
    data.tickets = data.tickets.map(t => t.id === id ? { ...t, status } : t);
    await saveData(data);
    refreshAndRender();
  } catch (err) {
    alert(err.message);
  }
}

// ---- Rendering ----

function renderAdmin(tickets) {
  const box = document.getElementById("adminTickets");
  box.innerHTML = "";

  tickets.forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    div.innerHTML = `
      <div class="status ${t.status}">${t.status.toUpperCase()}</div>
      <b>User:</b> ${t.name}
    `;

    t.answers.forEach(a => {
      div.innerHTML += `<div>${a.q}: ${a.a}</div>`;
    });

    const btns = document.createElement("div");
    btns.className = "adminBtns";

    const r = document.createElement("button");
    r.innerText = "Resolve";
    r.onclick = () => setStatus(t.id, "resolved");

    const d = document.createElement("button");
    d.innerText = "Deny";
    d.onclick = () => setStatus(t.id, "denied");

    btns.appendChild(r);
    btns.appendChild(d);

    div.appendChild(btns);
    box.appendChild(div);
  });
}

function renderUser(tickets) {
  const box = document.getElementById("myTickets");
  box.innerHTML = "";

  tickets.filter(t => t.user === currentUser).forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    div.innerHTML = `
      <div class="status ${t.status}">${t.status.toUpperCase()}</div>
      <b>Name:</b> ${t.name}
    `;

    t.answers.forEach(a => {
      div.innerHTML += `<div>${a.q}: ${a.a}</div>`;
    });

    box.appendChild(div);
  });
}

async function refreshAndRender() {
  try {
    const data = await fetchData();
    renderUser(data.tickets);

    if (currentUser === OWNER) {
      adminBox.classList.remove("hidden");
      renderAdmin(data.tickets);
    } else {
      adminBox.classList.add("hidden");
    }
  } catch (err) {
    console.error(err);
  }
}

function startPolling() {
  refreshAndRender();
  pollHandle = setInterval(refreshAndRender, POLL_INTERVAL_MS);
}

function stopPolling() {
  if (pollHandle) {
    clearInterval(pollHandle);
    pollHandle = null;
  }
}

function loadUI() {
  authBox.classList.add("hidden");
  ticketBox.classList.remove("hidden");
  statusBox.classList.remove("hidden");

  topRight.innerHTML = `Logged in as ${currentUser} <button onclick="logout()" style="width:auto;display:inline;margin-left:8px;">Logout</button>`;

  buildForm();
  startPolling(); // checks shared storage every few seconds, so everyone sees new tickets without refreshing
}

if (currentUser && BLOB_URL) loadUI();
</script>

</body>
</html>
