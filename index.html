<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  color: #222;
}

.topbar {
  background: white;
  padding: 14px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
}

.wrap {
  max-width: 900px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.hidden { display: none; }

input, button {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

#formArea {
  margin-top: 12px;
}

.questionBox {
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  margin-bottom: 14px;
  background: #fafafa;
}

.questionTitle {
  font-weight: bold;
  margin-bottom: 10px;
}

.toggleGroup {
  display: flex;
  gap: 10px;
}

.toggleBtn {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 18px;
  background: white;
  transition: 0.2s;
}

.toggleBtn:hover {
  transform: scale(1.03);
}

.toggleBtn.activeV {
  background: #d4f7d4;
  border: 2px solid #2e7d32;
}

.toggleBtn.activeX {
  background: #ffd6d6;
  border: 2px solid #b71c1c;
}

.ticket {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  background: #fafafa;
}

.status {
  font-weight: bold;
  margin-bottom: 8px;
}

.status.pending { color: orange; }
.status.resolved { color: green; }
.status.denied { color: red; }

.adminBtns {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.note {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Ticket System</div>
  <div id="topRight"></div>
</div>

<div class="wrap">

  <div class="card" id="authBox">
    <h3>Login / Register</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <div class="note">Username must be at least 4 characters. Password at least 6.</div>
  </div>

  <div class="card hidden" id="ticketBox">
    <h3>Create Ticket</h3>
    <input id="nameInput" placeholder="Your name">
    <div id="formArea"></div>
    <button onclick="submitTicket()">Send Ticket</button>
  </div>

  <div class="card hidden" id="adminBox">
    <h3>FishHook Admin</h3>
    <div id="adminTickets"></div>
  </div>

  <div class="card hidden" id="statusBox">
    <h3>My Tickets</h3>
    <div id="myTickets"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ====================================================================
// PASTE YOUR OWN FIREBASE CONFIG HERE
// (Firebase console -> Project settings -> General -> Your apps -> SDK setup)
// ====================================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const OWNER = "FishHook";
// Firebase Auth needs an email address, so usernames are mapped to a fake
// email under this domain. Users never see this, they just type a username.
const FAKE_EMAIL_DOMAIN = "@ticketapp.local";

const authBox = document.getElementById("authBox");
const ticketBox = document.getElementById("ticketBox");
const adminBox = document.getElementById("adminBox");
const statusBox = document.getElementById("statusBox");
const topRight = document.getElementById("topRight");
const nameInput = document.getElementById("nameInput");
const userInput = document.getElementById("user");
const passInput = document.getElementById("pass");

let currentUsername = null;
let allTickets = []; // kept in sync live via onSnapshot

function usernameToEmail(u) {
  return u.toLowerCase() + FAKE_EMAIL_DOMAIN;
}

window.register = async function () {
  const u = userInput.value.trim();
  const p = passInput.value.trim();

  if (u.length < 4) return alert("username must be at least 4 characters");
  if (p.length < 6) return alert("password must be at least 6 characters");

  try {
    const cred = await createUserWithEmailAndPassword(auth, usernameToEmail(u), p);
    await updateProfile(cred.user, { displayName: u });
    alert("registered! now click Login.");
  } catch (err) {
    alert(friendlyError(err));
  }
};

window.login = async function () {
  const u = userInput.value.trim();
  const p = passInput.value.trim();

  if (!u || !p) return alert("fill all");

  try {
    await signInWithEmailAndPassword(auth, usernameToEmail(u), p);
    // onAuthStateChanged below handles the rest
  } catch (err) {
    alert(friendlyError(err));
  }
};

window.logout = async function () {
  await signOut(auth);
};

function friendlyError(err) {
  const code = err.code || "";
  if (code.includes("email-already-in-use")) return "username already taken";
  if (code.includes("invalid-credential") || code.includes("wrong-password") || code.includes("user-not-found")) return "wrong login";
  if (code.includes("weak-password")) return "password too weak";
  return err.message || "something went wrong";
}

const questions = [
  { text: "Do you need help?" }
];

function buildForm() {
  const out = document.getElementById("formArea");
  out.innerHTML = "";

  questions.forEach((q) => {
    const box = document.createElement("div");
    box.className = "questionBox";

    const title = document.createElement("div");
    title.className = "questionTitle";
    title.innerText = q.text;

    let state = null;

    const group = document.createElement("div");
    group.className = "toggleGroup";

    const yes = document.createElement("div");
    yes.className = "toggleBtn";
    yes.innerText = "✅";

    const no = document.createElement("div");
    no.className = "toggleBtn";
    no.innerText = "❌";

    yes.onclick = () => {
      state = state === "yes" ? null : "yes";
      yes.classList.toggle("activeV", state === "yes");
      no.classList.remove("activeX");
    };

    no.onclick = () => {
      state = state === "no" ? null : "no";
      no.classList.toggle("activeX", state === "no");
      yes.classList.remove("activeV");
    };

    box._getValue = () => state;

    group.appendChild(yes);
    group.appendChild(no);

    box.appendChild(title);
    box.appendChild(group);
    out.appendChild(box);
  });
}

window.submitTicket = async function () {
  const name = nameInput.value.trim();
  if (!name) return alert("name required");

  const answers = [];
  document.querySelectorAll(".questionBox").forEach((box, i) => {
    answers.push({
      q: questions[i].text,
      a: box._getValue()
    });
  });

  try {
    await addDoc(collection(db, "tickets"), {
      user: currentUsername,
      name,
      status: "pending",
      answers,
      createdAt: Date.now()
    });
    nameInput.value = "";
    buildForm(); // reset toggles
  } catch (err) {
    alert("could not submit ticket: " + err.message);
  }
};

window.setStatus = async function (id, status) {
  try {
    await updateDoc(doc(db, "tickets", id), { status });
  } catch (err) {
    alert("could not update ticket: " + err.message);
  }
};

function renderAdmin() {
  const box = document.getElementById("adminTickets");
  box.innerHTML = "";

  allTickets.forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    div.innerHTML = `
      <div class="status ${t.status}">${t.status.toUpperCase()}</div>
      <b>User:</b> ${t.name}
    `;

    t.answers.forEach(a => {
      div.innerHTML += `<div>${a.q}: ${a.a}</div>`;
    });

    const btns = document.createElement("div");
    btns.className = "adminBtns";

    const r = document.createElement("button");
    r.innerText = "Resolve";
    r.onclick = () => window.setStatus(t.id, "resolved");

    const d = document.createElement("button");
    d.innerText = "Deny";
    d.onclick = () => window.setStatus(t.id, "denied");

    btns.appendChild(r);
    btns.appendChild(d);

    div.appendChild(btns);
    box.appendChild(div);
  });
}

function renderUser() {
  const box = document.getElementById("myTickets");
  box.innerHTML = "";

  allTickets.filter(t => t.user === currentUsername).forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    div.innerHTML = `
      <div class="status ${t.status}">${t.status.toUpperCase()}</div>
      <b>Name:</b> ${t.name}
    `;

    t.answers.forEach(a => {
      div.innerHTML += `<div>${a.q}: ${a.a}</div>`;
    });

    box.appendChild(div);
  });
}

function renderAll() {
  renderUser();

  if (currentUsername === OWNER) {
    adminBox.classList.remove("hidden");
    renderAdmin();
  } else {
    adminBox.classList.add("hidden");
  }
}

let unsubscribeTickets = null;

function startTicketListener() {
  const q = query(collection(db, "tickets"), orderBy("createdAt", "desc"));
  unsubscribeTickets = onSnapshot(q, (snapshot) => {
    allTickets = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  }, (err) => {
    console.error("ticket listener error", err);
  });
}

function loadUI() {
  authBox.classList.add("hidden");
  ticketBox.classList.remove("hidden");
  statusBox.classList.remove("hidden");

  topRight.innerHTML = "";
  const label = document.createElement("span");
  label.innerText = `Logged in as ${currentUsername} `;
  const logoutBtn = document.createElement("button");
  logoutBtn.innerText = "Logout";
  logoutBtn.style.width = "auto";
  logoutBtn.onclick = () => window.logout();
  topRight.appendChild(label);
  topRight.appendChild(logoutBtn);

  buildForm();
  startTicketListener(); // real-time: updates instantly for everyone, every device
}

function unloadUI() {
  authBox.classList.remove("hidden");
  ticketBox.classList.add("hidden");
  adminBox.classList.add("hidden");
  statusBox.classList.add("hidden");
  topRight.innerHTML = "";
  if (unsubscribeTickets) {
    unsubscribeTickets();
    unsubscribeTickets = null;
  }
}

onAuthStateChanged(auth, (firebaseUser) => {
  if (firebaseUser) {
    currentUsername = firebaseUser.displayName || firebaseUser.email.split("@")[0];
    loadUI();
  } else {
    currentUsername = null;
    unloadUI();
  }
});
</script>

</body>
</html>
